<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加者一覧 - すめ鯖 Portal</title>
  <!-- Google Fonts for modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Link to the main style.css in the parent directory -->
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <!-- Header (Same design as TOP page, with paths adjusted for sub-directory) -->
  <header class="site-header">
    <a class="site-logo" href="../index.html">すめ鯖 Portal</a>
    <nav class="site-nav">
      <a href="sumesaba-members.html" class="nav-link">参加者一覧</a>
      <a href="../guides/sumesaba-guide.html" class="nav-link">導入ガイド</a>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main class="main-content">
    <section class="members-section">
      <!-- Section Header -->
      <header class="section-header">
        <h1 class="section-title">参加者一覧</h1>
        <p class="section-subtitle">すめ鯖に参加しているメンバーの一覧です。</p>
      </header>

      <!-- Grid container for member cards -->
      <div class="members-grid">
        
        <!-- ==========================================
             メンバーカード 1
             ========================================== -->
        <article class="member-card">
          <!-- 役職バッジ (役職がない場合はこのdivタグ自体を削除してください) -->
          <div class="member-badge">管理者</div>
          <!-- 参加者名 -->
          <h2 class="member-name">彗明 / Sumeiy</h2>
          <!-- 肩書き・立場 -->
          <p class="member-role">管理者</p>
          <div class="member-divider"></div>
          <!-- ひとこと説明 (お好みの文章に変更してください) -->
          <p class="member-desc">sample</p>
          <!-- 主な活動・担当タグ (何個でも追加可能です) -->
          <div class="member-activities">
            <span class="activity-tag">サーバー管理</span>
            <span class="activity-tag">イベント企画</span>
            <span class="activity-tag">インフラ構築</span>
          </div>
        </article>

        <!-- ==========================================
             メンバーカード 2
             ========================================== -->
        <article class="member-card">
          <!-- モデレーター用の色違いバッジ (modクラスを付与しています) -->
          <div class="member-badge mod">sample</div>
          <h2 class="member-name">sample / sample</h2>
          <p class="member-role">sample</p>
          <div class="member-divider"></div>
          <p class="member-desc">sample</p>
          <div class="member-activities">
            <span class="activity-tag">sample</span>
            <span class="activity-tag">sample</span>
          </div>
        </article>

        <!-- ==========================================
             メンバーカード 3
             ========================================== -->
        <article class="member-card">
          <h2 class="member-name">sample / sample</h2>
          <p class="member-role">sample</p>
          <div class="member-divider"></div>
          <p class="member-desc">sample</p>
          <div class="member-activities">
            <span class="activity-tag">sample</span>
            <span class="activity-tag">sample</span>
          </div>
        </article>

        <!-- ==========================================
             メンバーカード 4
             ========================================== -->
        <article class="member-card">
          <h2 class="member-name">sample / sample</h2>
          <p class="member-role">sample / sample</p>
          <div class="member-divider"></div>
          <p class="member-desc">sample</p>
          <div class="member-activities">
            <span class="activity-tag">sample</span>
            <span class="activity-tag">sample</span>
          </div>
        </article>

      </div>
    </section>
  </main>
</body>
</html>
